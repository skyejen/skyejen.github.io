name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install MkDocs Material
        # Pinned to the 9.x line: mkdocs-material 2.0 rewrote theming and breaks
        # our overrides with no migration path. This lets 9.x patches in, not 2.0.
        run: pip install "mkdocs-material>=9.7,<10"

      - name: Deploy
        run: mkdocs gh-deploy --force
