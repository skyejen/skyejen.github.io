{#- Landing-page header: logo top-left, name, night toggle, GitHub + LinkedIn.
    No nav drawer / no search — this is a single page. -#}
<header class="md-header md-header--shadow" data-md-component="header">
  <nav class="md-header__inner md-grid" aria-label="{{ lang.t('header') }}">
    <div class="sj-brand">
      <a href="{{ nav.homepage.url | url }}" title="{{ config.site_name | e }}" class="md-header__button md-logo" aria-label="{{ config.site_name }}" data-md-component="logo">
        {% include "partials/logo.html" %}
      </a>
      <div class="md-header__title sj-header-title">
        <div class="md-header__ellipsis">
          <div class="md-header__topic">
            <span class="md-ellipsis">
              <a class="sj-user" href="https://skyejen.github.io" title="skyejen">skyejen</a>
            </span>
          </div>
        </div>
      </div>
    </div>
    <button class="md-header__button md-icon sj-night-toggle" title="Toggle night mode" aria-label="Toggle night mode" type="button">
      {% include ".icons/material/weather-night.svg" %}
    </button>
    <span class="sj-hdr-sep" aria-hidden="true"></span>
    <a class="md-header__button md-icon sj-github" href="https://github.com/skyejen" title="GitHub" rel="noopener" target="_blank">
      {% include ".icons/fontawesome/brands/github.svg" %}
    </a>
    <a class="md-header__button md-icon sj-linkedin" href="https://www.linkedin.com/in/skyejen/" title="LinkedIn" rel="noopener" target="_blank">
      {% include ".icons/fontawesome/brands/linkedin.svg" %}
    </a>
  </nav>
</header>
